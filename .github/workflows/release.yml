name: Release

on:
  workflow_run:
    workflows:
      - Build
    types:
      - completed

permissions:
  actions: read
  contents: write
  pull-requests: read

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    if: ${{ github.event.workflow_run.event == 'push' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.head_repository.full_name == github.repository && github.event.workflow_run.head_repository.fork == false }}
    runs-on: ubuntu-latest
    steps:
      - name: Check whether release should run
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        shell: bash
        run: |
          set -euo pipefail

          PRS_JSON="$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/$REPOSITORY/commits/$HEAD_SHA/pulls")"

          DEPENDABOT_PR="$(jq -r '[.[] | select(.user.login == "dependabot[bot]" and .merged_at != null)] | first | .number // empty' <<<"$PRS_JSON")"

          if [ -n "$DEPENDABOT_PR" ]; then
            echo "skip_release=true" >> "$GITHUB_OUTPUT"
            echo "Skipping release for merged Dependabot PR #$DEPENDABOT_PR."
            exit 0
          fi

          echo "skip_release=false" >> "$GITHUB_OUTPUT"

      - name: Check out release commit
        if: steps.gate.outputs.skip_release != 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main
          fetch-depth: 0

      - name: Validate and check out trusted commit
        if: steps.gate.outputs.skip_release != 'true'
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        shell: bash
        run: |
          set -euo pipefail

          git merge-base --is-ancestor "$HEAD_SHA" origin/main
          git checkout --detach "$HEAD_SHA"

      - name: Set up JDK 21
        if: steps.gate.outputs.skip_release != 'true'
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Build release artifact
        if: steps.gate.outputs.skip_release != 'true'
        run: mvn -B -DskipTests package

      - name: Run JReleaser
        if: steps.gate.outputs.skip_release != 'true'
        uses: jreleaser/release-action@90ac653bb9c79d11179e65d81499f3f34527dcd5
        with:
          setup-java: false
        env:
          JRELEASER_GITHUB_TOKEN: ${{ github.token }}

      - name: Upload JReleaser logs
        if: always() && steps.gate.outputs.skip_release != 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: jreleaser-release-${{ github.event.workflow_run.head_sha }}
          path: |
            out/jreleaser/trace.log
            out/jreleaser/output.properties
          if-no-files-found: ignore
