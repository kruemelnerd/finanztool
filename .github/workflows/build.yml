name: Build
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: 21
          distribution: temurin
      - name: Cache SonarQube packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache Maven packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=kruemelnerd_finanztool -Dsonar.qualitygate.wait=true -Dsonar.qualitygate.timeout=600

  prepare-release-bump:
    name: Prepare patch release bump
    needs:
      - build
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      pull-requests: write
    steps:
      - name: Check out main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: main
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Detect Renovate automerge push
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          PR_NUMBER="$(gh api "/repos/$REPOSITORY/commits/$HEAD_SHA/pulls" --jq '.[0].number // empty')"
          if [ -z "$PR_NUMBER" ]; then
            echo "should_bump=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          HEAD_REF="$(gh pr view "$PR_NUMBER" --repo "$REPOSITORY" --json headRefName --jq '.headRefName')"
          AUTHOR_LOGIN="$(gh pr view "$PR_NUMBER" --repo "$REPOSITORY" --json author --jq '.author.login')"
          AUTOMERGE_LABEL_COUNT="$(gh pr view "$PR_NUMBER" --repo "$REPOSITORY" --json labels --jq '[.labels[] | select(.name == "renovate-automerge")] | length')"

          if [ "$AUTOMERGE_LABEL_COUNT" -eq 0 ]; then
            echo "should_bump=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "$HEAD_REF" in
            renovate/*)
              ;;
            *)
              if [ "$AUTHOR_LOGIN" != "renovate[bot]" ] && [ "$AUTHOR_LOGIN" != "app/renovate" ]; then
                echo "should_bump=false" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              ;;
          esac

          HEAD_MESSAGE="$(git log -1 --pretty=%s "$HEAD_SHA")"
          if printf '%s' "$HEAD_MESSAGE" | grep -Eq '^chore\(release\): bump version to [0-9]+\.[0-9]+\.[0-9]+ \(patch\)$'; then
            echo "should_bump=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CURRENT_VERSION="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          RELEASE_BRANCH="release-bump/${NEW_VERSION}"

          EXISTING_PR_NUMBER="$(gh pr list --repo "$REPOSITORY" --base main --head "$RELEASE_BRANCH" --state open --json number --jq '.[0].number // empty')"
          if [ -n "$EXISTING_PR_NUMBER" ]; then
            echo "should_bump=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_bump=true" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_branch=$RELEASE_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Bump version and create release PR
        if: ${{ steps.detect.outputs.should_bump == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_VERSION: ${{ steps.detect.outputs.new_version }}
          RELEASE_BRANCH: ${{ steps.detect.outputs.release_branch }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "$RELEASE_BRANCH"
          mvn -q versions:set -DnewVersion="$NEW_VERSION" -DgenerateBackupPoms=false
          git add pom.xml
          git commit -m "chore(release): bump version to $NEW_VERSION (patch)"
          git push --set-upstream origin "$RELEASE_BRANCH"

          PR_BODY="$(printf '## Summary\n- bump the application version after an automerged Renovate update')"

          gh pr create \
            --repo "$REPOSITORY" \
            --base main \
            --head "$RELEASE_BRANCH" \
            --title "chore(release): bump version to $NEW_VERSION (patch)" \
            --body "$PR_BODY"

  release:
    name: Build and publish release
    needs:
      - build
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      artifact-metadata: write
      attestations: write
      contents: write
      id-token: write
      pull-requests: read
    concurrency:
      group: release-main
      cancel-in-progress: false
    steps:
      - name: Check out main
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: main
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Validate and check out trusted commit
        env:
          HEAD_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          git merge-base --is-ancestor "$HEAD_SHA" origin/main
          git checkout --detach "$HEAD_SHA"

      - name: Detect release bump commit
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          HEAD_MESSAGE="$(git log -1 --pretty=%s)"
          if printf '%s' "$HEAD_MESSAGE" | grep -Eq '^chore\(release\): bump version to [0-9]+\.[0-9]+\.[0-9]+ \(patch\)$'; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PROJECT_VERSION="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
          echo "project_version=$PROJECT_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=v${PROJECT_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build release artifact
        if: ${{ steps.detect.outputs.should_release == 'true' }}
        run: mvn -B -DskipTests package

      - name: Generate artifact attestation
        if: ${{ steps.detect.outputs.should_release == 'true' }}
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: target/*.jar

      - name: Compute JReleaser metadata
        if: ${{ steps.detect.outputs.should_release == 'true' }}
        id: release-meta
        shell: bash
        run: |
          set -euo pipefail

          echo "project_version=${{ steps.detect.outputs.project_version }}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${{ steps.detect.outputs.release_tag }}" >> "$GITHUB_OUTPUT"

      - name: Run JReleaser
        if: ${{ steps.detect.outputs.should_release == 'true' }}
        uses: jreleaser/release-action@90ac653bb9c79d11179e65d81499f3f34527dcd5
        with:
          setup-java: false
        env:
          JRELEASER_GITHUB_TOKEN: ${{ github.token }}
          JRELEASER_PROJECT_VERSION: ${{ steps.release-meta.outputs.project_version }}
          JRELEASER_TAG_NAME: ${{ steps.release-meta.outputs.release_tag }}
          JRELEASER_RELEASE_NAME: Release ${{ steps.release-meta.outputs.release_tag }}

      - name: Upload JReleaser logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: jreleaser-release-${{ github.sha }}
          path: |
            out/jreleaser/trace.log
            out/jreleaser/output.properties
          if-no-files-found: ignore
