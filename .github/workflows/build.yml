name: Build
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: 21
          distribution: temurin
      - name: Cache SonarQube packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache Maven packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=kruemelnerd_finanztool -Dsonar.qualitygate.wait=true -Dsonar.qualitygate.timeout=600

  version-bump:
    name: Semantic Version Bump
    needs: build
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    outputs:
      is_version_bump_commit: ${{ steps.gate.outputs.is_version_bump_commit }}
      should_release: ${{ steps.release-target.outputs.should_release }}
      release_sha: ${{ steps.release-target.outputs.release_sha }}
    permissions:
      contents: write
    concurrency:
      group: version-bump-main
      cancel-in-progress: false
    steps:
      - name: Check out main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: main
          fetch-depth: 0

      - name: Detect auto version bump commit
        id: gate
        env:
          HEAD_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          HEAD_MESSAGE="$(git log -1 --pretty=%B "$HEAD_SHA")"
          if printf '%s' "$HEAD_MESSAGE" | grep -Eq '^chore\(release\): bump version to '; then
            echo "is_version_bump_commit=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "is_version_bump_commit=false" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 21
        if: steps.gate.outputs.is_version_bump_commit != 'true'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: 21
          distribution: temurin

      - name: Cache Maven packages
        if: steps.gate.outputs.is_version_bump_commit != 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Determine semantic bump level
        if: steps.gate.outputs.is_version_bump_commit != 'true'
        id: semver
        env:
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          RANGE="$BEFORE_SHA..$HEAD_SHA"
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            RANGE="$HEAD_SHA^..$HEAD_SHA"
          fi

          COMMIT_MESSAGES="$(git log --format=%B "$RANGE")"
          export COMMIT_MESSAGES

          BUMP_LEVEL="$(python3 - <<'PY'
          import os
          import re

          messages = os.environ.get("COMMIT_MESSAGES", "")

          if re.search(r'(^|\n)\s*BREAKING CHANGE\s*:', messages, flags=re.IGNORECASE):
            print("major")
          elif re.search(r'^[a-zA-Z]+(?:\([^)]+\))?!:', messages, flags=re.MULTILINE):
            print("major")
          elif re.search(r'^feat(?:\([^)]+\))?:', messages, flags=re.MULTILINE):
            print("minor")
          else:
            print("patch")
          PY
          )"

          echo "level=$BUMP_LEVEL" >> "$GITHUB_OUTPUT"

      - name: Compute next version
        if: steps.gate.outputs.is_version_bump_commit != 'true'
        id: version
        env:
          BUMP_LEVEL: ${{ steps.semver.outputs.level }}
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_VERSION="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
          export CURRENT_VERSION
          export BUMP_LEVEL

          NEXT_VERSION="$(python3 - <<'PY'
          import os
          import re
          import sys

          current = os.environ["CURRENT_VERSION"].strip()
          bump = os.environ["BUMP_LEVEL"].strip()

          match = re.fullmatch(r'(\d+)\.(\d+)\.(\d+)([.-].+)?', current)
          if not match:
            print(f"Cannot increment version '{current}' because it is not semver-like (<major>.<minor>.<patch>).", file=sys.stderr)
            sys.exit(1)

          major = int(match.group(1))
          minor = int(match.group(2))
          patch = int(match.group(3))
          suffix = match.group(4) or ""

          if bump == "major":
            major += 1
            minor = 0
            patch = 0
          elif bump == "minor":
            minor += 1
            patch = 0
          else:
            patch += 1

          next_version = f"{major}.{minor}.{patch}{suffix}"
          print(next_version)
          PY
          )"

          echo "bump_level=$BUMP_LEVEL" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set new Maven version
        if: steps.gate.outputs.is_version_bump_commit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mvn -B versions:set -DnewVersion="${{ steps.version.outputs.next }}" -DgenerateBackupPoms=false

      - name: Build jar for new version
        if: steps.gate.outputs.is_version_bump_commit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mvn -B -DskipTests package

      - name: Commit and push version bump
        if: steps.gate.outputs.is_version_bump_commit != 'true'
        id: bump-push
        env:
          BUMP_LEVEL: ${{ steps.version.outputs.bump_level }}
          NEXT_VERSION: ${{ steps.version.outputs.next }}
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- pom.xml; then
            echo "No version change to commit."
            echo "bumped_sha=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git add pom.xml
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
            commit -m "chore(release): bump version to ${NEXT_VERSION} (${BUMP_LEVEL})"
          git push origin HEAD:main
          echo "bumped_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Determine release target
        id: release-target
        env:
          BUMPED_SHA: ${{ steps.bump-push.outputs.bumped_sha }}
          HEAD_SHA: ${{ github.sha }}
          IS_VERSION_BUMP_COMMIT: ${{ steps.gate.outputs.is_version_bump_commit }}
        shell: bash
        run: |
          set -euo pipefail

          if [ "$IS_VERSION_BUMP_COMMIT" = "true" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "release_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "$BUMPED_SHA" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "release_sha=$BUMPED_SHA" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_release=false" >> "$GITHUB_OUTPUT"
          echo "release_sha=" >> "$GITHUB_OUTPUT"

  release:
    name: Build and publish release
    needs:
      - build
      - version-bump
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build.result == 'success' && needs.version-bump.result == 'success' && needs.version-bump.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      artifact-metadata: write
      attestations: write
      contents: write
      id-token: write
      pull-requests: read
    concurrency:
      group: release-main
      cancel-in-progress: false
    steps:
      - name: Check out main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: main
          fetch-depth: 0

      - name: Validate and check out trusted commit
        env:
          HEAD_SHA: ${{ needs.version-bump.outputs.release_sha }}
        shell: bash
        run: |
          set -euo pipefail

          git merge-base --is-ancestor "$HEAD_SHA" origin/main
          git checkout --detach "$HEAD_SHA"

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Build release artifact
        run: mvn -B -DskipTests package

      - name: Generate artifact attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: target/*.jar


      - name: Compute JReleaser metadata
        id: release-meta
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_VERSION="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
          RELEASE_SHA_SHORT="$(git rev-parse --short HEAD)"
          RELEASE_TAG="release-${PROJECT_VERSION}-${RELEASE_SHA_SHORT}"

          echo "project_version=$PROJECT_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Run JReleaser
        uses: jreleaser/release-action@90ac653bb9c79d11179e65d81499f3f34527dcd5
        with:
          setup-java: false
        env:
          JRELEASER_GITHUB_TOKEN: ${{ github.token }}
          JRELEASER_PROJECT_VERSION: ${{ steps.release-meta.outputs.project_version }}
          JRELEASER_TAG_NAME: ${{ steps.release-meta.outputs.release_tag }}
          JRELEASER_RELEASE_NAME: Release ${{ steps.release-meta.outputs.release_tag }}

      - name: Upload JReleaser logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: jreleaser-release-${{ github.sha }}
          path: |
            out/jreleaser/trace.log
            out/jreleaser/output.properties
          if-no-files-found: ignore
